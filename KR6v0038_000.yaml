front:
  text: 佛說相好經整理者黃霞題解佛說相好經又名佛說觀佛三昧海經本行品第八中國人假托佛說所撰經典作者不詳一卷本經乃割裂佛說觀佛三昧海經中觀相品及本行品中關於佛各種相好的文字拼綴而成以供信徒持誦觀佛三昧經中謂如來有三十二大人相八十種隨形好佛生人間示同人事因人相故說三十二相勝諸天故說八十種好為諸菩薩說八萬四千諸妙相好佛實相好此外該經於每一相好下還有三念佛字樣可知該經是供信徒念誦修功德所用本經在流傳過程中形成為兩大系統該兩大系統的區別在於第二系統經文比第一系統多若我滅度後此人亦除卻八十億劫生死之罪佛告阿難何況繫念觀佛三昧等二段文字兩大系統本身因文字的差異又形成若干異本今據整理所得將兩大系統及諸異本情況簡述如下第一系統有異本兩種其區別主要為有無關於順觀逆觀佛身的敘述今將它們整理為録文一與録文二第二系統有異本三種第一種異本無順觀逆觀佛身文第二第三兩種則有這一段文字但第二種異本在敘述佛之諸相好後一般均有三念佛云云第三種異本則無另外第二種異本沒有若我滅度後此人亦除卻八十億劫生死之罪這段文字代之以若有行者注是人語一段故分別將它們整理為録文三録文四録文五此外上述五種異本對佛之相好的描述雖均相同行文亦偶有參差本經諸異本均未為歷代大藏經所收此次整理所用諸本之底校本情況如下第一系統録文一底本北閏號斯號二者相拼恰為完整校本甲伯號首全尾殘校本乙俄號首尾均殘録文二底本伯號背首殘尾全校本甲斯號首殘尾全第二系統録文三底本伯號首尾全無校本録文四底本北日號首殘尾全無校本録文五底本斯號首尾全無校本校本甲斯號首殘尾全無校本録文一
