body:
  text: 佛如來頂上肉髻團圓湧起猶如合拳其上平偃猶如天蓋三念阿彌陀佛佛如來頭上有八萬四千髮一一髮長一丈三尺五寸猶如黑絲分齊分明四觚分明毛皆兩靡右旋而生如紺琉璃色右旋婉轉卷成蠡文在佛頭上一一毛孔旋生五光入諸光中三念佛佛如來頭皮黃金色亦生衆光入腦光十四色中三念佛佛如來頭頂骨其色正白如頗黎雪山不得為比三念佛佛如來腦紅頗黎色有十四脈衆畫具足一一畫有十四光分明了了於腦脈中旋生諸光上衝頭骨乃至髮際光有十四色圍繞衆髮三念佛佛如來髮際如赤真珠色婉轉下垂有五千光間錯分明皆向上靡圍繞衆髮從頂上出生諸化佛三念佛佛如來額廣平正額上諸毛毛皆上靡其毛根下梵磨尼色毛端流光如融紫金光相上靡入於髮際婉轉下垂至耳輪邊然後布散入諸髮間圍繞蠡文數百千匝從枕骨出如金蓮華日照開敷適衆生意三念佛佛如來白毫相長一丈六尺十楞分明如白琉璃筒中外俱空右旋婉轉在佛眉間圍如三寸如白頗黎珠十方光現映蔽衆目如億萬日不可具見於毛端頭出五色光明還入毛孔三念佛佛如來左右二眉形如初月繞生諸毛稀稠得所眉光兩靡散入諸髮其色艷紫紺青琉璃豐翠孔雀色無異類猶如聚墨比琉璃光眉下三畫及眼眶中旋生四光青黃赤白上向焰出入眉骨中出眉毛端三念佛佛如來眼睫上下各生五百毛柔軟可愛如優曇鉢華鬚三念佛佛如來眼如四大海水青白分明白者白於白寶青者勝青蓮華上下俱瞬如牛王目目雙齊頭旋生二光如青蓮花三念佛佛如來耳普垂埵相兩耳孔中旋生七毛輪郭衆相如寶蓮花懸處日光兩耳內外出生蓮華及耳孔七毛流出諸光光有五百支支有五百色三念佛佛如來方頰車相頰上六畫中左右正等有妙光色輝艷倍常如淨金色譬如和合百千日月三念佛佛如來鼻高修直如鑄金槌當於面門其孔流光上下灌注三念佛佛如來髭鬚如科斗形於毛端頭開敷三光紫紺紅色直從口邊旋頸上照圍繞圓光作三種畫其畫分明色中上者三念佛佛如來師子相佛張口時如獅子王口方整等口兩吻邊流出二光其光金色三念佛佛如來唇色紅赤如頻果婆於上下唇及齦腭間和合出光其光團圓猶如百千赤真珠貫從佛口出入於佛鼻從佛鼻出入白豪中從白豪出入諸髮間影飾諸花三念佛佛如來口四十齒齒印文上生光其光紅白光光相照照四十齒令四十齒聽然齊白如頗黎碧珠上下齊平無參差者其齒間之畫流出諸光赤紅白色如是衆色佛在世時影曜人目三念佛佛如來上腭有八萬四千畫了了分明下齦如優曇鉢華莖色三念佛佛如來廣長舌相佛舌出時如赤蓮華葉上至髮際遍覆佛面其舌根下及舌兩邊有二寶珠流注甘露滴舌根上諸天世人十地菩薩無此舌相亦無此味其舌上五畫五彩分明如寶印文其舌下十脈衆光流出如此上味入印文中流注上下入琉璃筒諸佛笑時動其舌跟此味力故舌出五色光五色分明三念佛佛如來咽嗡相光淨可愛如金翅鳥眼三念佛佛如來喉嚨如琉璃筒狀若纍蓮華節節相重三念佛佛如來心如紅蓮華金花映飾妙琉璃筒懸在佛胸團圓如心開如不開合如不合紅華金光有八萬四千脈猶如天畫一一畫中有八萬四千光一一光明有八萬四千色一一色中有無量微塵數化佛一一化佛坐金剛臺其金剛臺放金色光是諸化佛遊佛心間徑往五道度苦衆生三念佛佛如來頸臃圓相三約分明有二種光其光萬色三念佛佛如來咽喉有三點相分明猶如伊字一一點中流出二光三念佛佛如來缺盆骨兩手兩足及頂後七處皆平滿相光明遍照十方世界作虎珀色三念佛佛如來兩肩膊圓滿相三念佛佛如來臂臃纖圓如象王鼻三念佛佛如來肘骨如龍王髮婉轉相著節頭蟠龍不見其迹三念佛佛如來手十指纖長參差不失其所於一一指節端各有十二輪相見三念佛佛如來赤銅爪其爪八色了了分明三念佛佛如來手十指節端各有萬字相一一點間有千輻輪相三念佛佛如來手合縵掌斂指不見張時則現如真珠網分明可愛三念佛佛如來手掌文蘭成如自在天宮其掌平正人天無類當於掌中生千輻輪相於十方面開摩尼光三念佛佛如來手背毛皆向上靡如紺琉璃流出五光入網縵中三念佛佛如來手足柔軟如天劫貝三念佛佛如來手內外握三念佛佛如來身上胸臆廣厚如師子王三念佛佛如來胸德字萬印相中放三摩尼光三念佛佛如來腋下平滿懸生五珠如摩尼珠上著於腋有五百色光明共相影發三念佛佛如來腹小不現相三念佛佛如來齊如毗稜伽寶珠於其齊中有萬億寶花一一寶花有萬億那由他葉有萬億那由他色一一色有萬億那由他光三念佛佛如來脅肋大小正等婉轉相著三念佛佛如來諸骨支節蟠龍相結其間密緻三念佛佛如來鉤鎖骨卷舒自在不相妨礙其骨色鮮白如頗黎雪山不得為譬上有紅光間錯成文凝液如脂皆出金色三念佛佛如來馬王藏相身根平滿狀若滿月有金色光猶如日輪三念佛佛如來兩䏶周圓漸次而斂三念佛佛如來兩膝骨圓著相好三念佛佛如來伊尼鹿王腨相三念佛佛如來足跟圓長有梵王頂相衆類不異各生一華微妙猶如淨國優鉢羅華三念佛佛如來兩足踝不現相三念佛佛如來趺高平相三念佛佛如來足趺上色如閻浮檀金色毛皆上靡及身諸毛隨一毛孔一毛旋生柔軟可愛三念佛佛如來足指網間如羅文彩於其文間衆色玄黃不可具名三念佛佛如來足十指纖圓邪齊如赤銅爪於其爪端有五師子口相三念佛佛如來十指端螺文相如毗尼羯摩天所畫之印三念佛佛如來足下平滿不容一毛三念佛佛如來足下千輻輪相轂輞具足魚鱗相次金剛處相三念佛佛如來那羅延力合以成身結跏趺坐百寶蓮華座三念佛自此已前是順觀佛身相法若欲逆觀佛者即從佛足指次第向上一一相好觀之至佛頂相此是逆觀法若欲觀佛圓光相者世尊在日若行之時頂光照地前一由旬純黃金色後一由旬純黃金色左一由旬純黃金色右一由旬純黃金色有人近佛左右行者其人臭穢皆悉不現人遠望之同為金色有人諦觀佛項光者前行看者見佛在前從後看者見佛在後左邊看者見佛在左右邊看者見佛在右八方人來遙見世尊項光各作是言瞿曇沙門在金山中遊行自在來向我所如是衆生各各異見此是項光相三念佛佛告阿難如來有三十二大人相八十種隨形好金色光明一一光明無量化佛身諸毛孔一切變現及佛色身略中説略者我今為此時會大衆及淨飯王略説相好佛生人間示同人事因人相故説三十二相勝諸天故説八十種好為諸菩薩説八萬四千諸妙相好佛寶相好我初成道摩伽陀國寂滅道場為普賢賢首等諸大菩薩於雜華經已廣分別此尊法中所以略説為諸凡夫及四部弟子謗方等經作五逆罪犯四重禁偷僧祗物淫比丘尼破八戒齋作諸惡事種種耶見如是等人若能至心一日一夜繫念在前觀佛如來一相好者諸惡罪障皆悉滅盡是故如來名婆伽婆名阿羅訶名三藐三佛陀名功德日名智滿月名清涼池名除罪珠名光明藏名智慧山名戒品河名迷衢導名邪見燈名破煩惱賊名一切衆生父母名大歸依處若有歸佛世尊者若稱名者除百千劫煩惱重障何況至心修念佛定録文完
